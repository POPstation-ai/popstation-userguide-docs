name: Deploy RAG Data to GCS

on:
  push:
    branches:
      - main # mainブランチに届いた時だけ動く
    paths:
      - "**.md" # Markdownファイルが更新された時だけ動く

jobs:
  convert-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write" # Google Cloud 連携に必要

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. MD を TXT に変換して一時フォルダに集める
      # 1. 先頭の "docs/" をパスから取り除く
      # Markdownの場合：スラッシュをアンダースコアに変えて .txt に変換
      # 画像(images/)やPDF(files/)の場合：
      # 階層構造を維持してコピー先でもディレクトリを作成する
      - name: Convert and Rename MD to TXT
        run: |
          rm -rf vertex-ai-export
          mkdir -p vertex-ai-export
          find docs -type f | while read f; do
            rel_path=${f#docs/}
            
            if [[ "$f" == *.md ]]; then

              new_name=$(echo "$rel_path" | sed 's/\//_/g' | sed 's/\.md$/.txt/')
              cp "$f" "vertex-ai-export/$new_name"
            else
              dest_path="vertex-ai-export/$rel_path"
              mkdir -p "$(dirname "$dest_path")"
              cp "$f" "$dest_path"
            fi
          done

          echo "--- 最終的な GCS 送信用リスト ---"
          ls -R vertex-ai-export

      # 2. Google Cloud 認証
      # 事前に GCP 側で Workload Identity 連携の設定が必要です
      - id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: "projects/459270910125/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account: "github-actions-deployer@popstation-dev.iam.gserviceaccount.com"

      # 3. GCS へアップロード - 先に同名ファイルがあっても上書きするため --parent=false を指定
      - name: "Upload data to GCS"
        id: "upload-to-gcs"
        uses: "google-github-actions/upload-cloud-storage@v2"
        with:
          path: "vertex-ai-export"
          destination: "dev-popstation-external/docs"
          parent: false

      # 次のステップで、上のアップロードが成功したか参照するために、outputs からアップロードしたファイルのリストを取得しておきます
      - name: "Check output"
        run: echo "Uploaded to ${{ steps.upload-to-gcs.outputs.uploaded_list }}"

      # 4. (オプション) Vertex AI Search のインポートをキックする
      # ※ 自動同期設定にしている場合は不要ですが、即時反映したいなら API を叩く設定をする→自動同期にすると思うので、ここではコメントアウトしておきます
